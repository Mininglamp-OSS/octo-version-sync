name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -timeout 60s ./...
      - name: go vet
        run: go vet ./...
