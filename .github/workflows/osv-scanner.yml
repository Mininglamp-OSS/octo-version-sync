name: OSV-Scanner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"  # Weekly Monday 04:30 UTC (12:30 CST)
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
    with:
      scan-args: |-
        -r
        ./
      # Private repo: Code Security (Advanced Security) is not enabled.
      # SARIF upload requires security-events:write which returns 403 on
      # private repos without Code Security. Scan results are still visible
      # in the workflow run output. Enable Code Security at the repo or org
      # level, then flip this to true.
      upload-sarif: false

  scan-pr:
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
    with:
      scan-args: |-
        -r
        ./
      # Private repo: SARIF upload disabled (Code Security not enabled).
      # Also guards against fork/dependabot read-only tokens.
      upload-sarif: false
